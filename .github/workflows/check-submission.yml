name: Check Submission

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for reflection.md
        run: |
          if [ ! -f "reflection.md" ]; then
            echo "::error::Missing reflection.md — please fill in and commit your reflection file."
            exit 1
          fi
          echo "reflection.md found"

      - name: Check reflection word count
        run: |
          if [ ! -f "reflection.md" ]; then
            exit 0
          fi
          WORDS=$(wc -w < "reflection.md")
          echo "Word count: $WORDS"
          if [ "$WORDS" -lt 250 ]; then
            echo "::warning::Your reflection.md has $WORDS words. Aim for at least 300 words."
          else
            echo "Reflection meets minimum length ($WORDS words)"
          fi

      - name: Check for project artifact
        run: |
          # Exclude instructor-provided files — only count student-uploaded content
          FILE_COUNT=$(find . -maxdepth 1 -type f \
            ! -name "reflection.md" \
            ! -name "reflection-template.md" \
            ! -name "README.md" \
            ! -name "ASSIGNMENT.md" \
            ! -name "INSTRUCTIONS*.md" \
            ! -name "INCLASS*.md" \
            ! -name "PRESENTATION*.md" \
            ! -name "*.yml" \
            ! -name "*.yaml" \
            | wc -l)
          # Also count files in subdirectories (e.g. screenshots/) excluding .github/
          SUBDIR_COUNT=$(find . -mindepth 2 -maxdepth 2 -type f \
            ! -path "./.github/*" \
            | wc -l)
          TOTAL=$((FILE_COUNT + SUBDIR_COUNT))
          if [ "$TOTAL" -eq 0 ]; then
            echo "::warning::No project file found. Upload your project file or add a links.md with your project URL."
          else
            echo "Project artifact found ($TOTAL file(s))"
          fi
